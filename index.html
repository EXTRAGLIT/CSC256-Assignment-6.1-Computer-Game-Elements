<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Character Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Computer Game Character Setup</h1>

    <form id="gameForm">

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>

        <label for="weapon">Weapon</label>
        <input type="text" id="weapon" placeholder="Choose a weapon" required>

        <label for="health">Health/Damage</label>
        <input type="number" id="health" placeholder="Enter health" required>

        <label for="points">Point Total</label>
        <input type="number" id="points" placeholder="Enter points" required>

        <button type="button" onclick="displayCharacter()">Submit</button>

    </form>

    <h2>Player Information</h2>

    <div id="output">
        Your character information will appear here.
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
